name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # 手動実行も可能

permissions:
  contents: write   # Release 作成に必要

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "27.2.12479018"
      CMAKE_VERSION: "3.22.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake
        run: |
          sdkmanager "ndk;${NDK_VERSION}" "cmake;${CMAKE_VERSION}"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Cross-compile OpenSSL (libcrypto, arm64-v8a)
        working-directory: android/native-deps
        run: bash build-openssl-android.sh

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --console=plain

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "dist/disproid-receiver-${GITHUB_REF_NAME}.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: disproid-receiver-apk
          path: dist/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
